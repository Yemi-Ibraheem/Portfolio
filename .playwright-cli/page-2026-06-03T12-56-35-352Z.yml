      - generic [ref=e211]:
        - paragraph [ref=e213]: Process
        - generic [ref=e214]:
          - article [ref=e215]:
            - paragraph [ref=e216]: "01"
            - heading "Understand the Mission" [level=2] [ref=e217]
            - paragraph [ref=e218]: Every successful product starts with understanding the problem before designing a solution. At the beginning of a project, I work closely with stakeholders to understand business objectives, user needs, technical constraints, and success metrics. I review existing products, analyse competitors, and identify opportunities within the market. This discovery phase ensures that design decisions are aligned with both business goals and user expectations from the very start.
          - article [ref=e219]:
            - paragraph [ref=e220]: "02"
            - heading "Research the Users" [level=2] [ref=e221]
            - paragraph [ref=e222]: Once the objectives are clear, I focus on understanding the people who will use the product. Through user interviews, surveys, workshops, analytics reviews, and competitor analysis, I gather insights into user behaviours, motivations, frustrations, and goals. This research helps uncover real user needs and prevents assumptions from driving design decisions. The findings are then synthesised into personas, user needs, and key opportunities for improvement.
          - article [ref=e223]:
            - paragraph [ref=e224]: "03"
            - heading "Map the Experience" [level=2] [ref=e225]
            - paragraph [ref=e226]: Using the insights gathered during research, I begin structuring the overall experience. This involves creating user journeys, task flows, information architecture, and user stories that map how users will interact with the product. By visualising the user's path from start to finish, I can identify pain points, remove unnecessary complexity, and ensure that the experience is intuitive and easy to navigate.
          - article [ref=e227]:
            - paragraph [ref=e228]: "04"
            - heading "Sketch and Wireframe" [level=2] [ref=e229]
            - paragraph [ref=e230]: Before investing time in visual design, I explore ideas through low-fidelity sketches and wireframes. This stage focuses on layout, content hierarchy, navigation, and functionality without the distraction of colours or branding. Wireframing allows me to rapidly test concepts, gather feedback, and iterate on solutions while ensuring that the product's structure supports user goals effectively.
          - article [ref=e231]:
            - paragraph [ref=e232]: "05"
            - heading "Design the Interface" [level=2] [ref=e233]
            - paragraph [ref=e234]: With a validated structure in place, I move into high-fidelity UI design. This is where the product begins to take shape visually through the application of typography, colour systems, spacing, imagery, and reusable components. I create interfaces that are not only visually appealing but also accessible, consistent, and scalable. Design systems and component libraries are often used to ensure efficiency and maintain consistency across the product.
          - article [ref=e235]:
            - paragraph [ref=e236]: "06"
            - heading "Prototype the Experience" [level=2] [ref=e237]
            - paragraph [ref=e238]: To bring the design to life, I create interactive prototypes that simulate the final user experience. Prototypes allow stakeholders, developers, and users to interact with the product before development begins. This stage helps validate user flows, test interactions, communicate design intent, and identify potential usability issues early, reducing costly changes later in the project lifecycle.
          - article [ref=e239]:
            - paragraph [ref=e240]: "07"
            - heading "Test, Learn and Improve" [level=2] [ref=e241]
            - paragraph [ref=e242]: Design is an iterative process, and testing plays a critical role in ensuring the final solution meets user needs. Through usability testing sessions, stakeholder reviews, accessibility checks, and feedback gathering, I evaluate how users interact with the product. The insights collected are used to refine the design, address friction points, and improve the overall user experience. This cycle of testing and iteration continues until the solution performs effectively for both users and the business.
          - article [ref=e243]:
            - paragraph [ref=e244]: "08"
            - heading "Handoff and Support Development" [level=2] [ref=e245]
            - paragraph [ref=e246]: Once the design is validated, I prepare detailed specifications, documentation, and assets for development. I work closely with engineers throughout implementation, providing guidance, answering questions, and conducting quality assurance reviews to ensure the final product reflects the intended design. My involvement continues beyond handoff to help maintain design quality and identify opportunities for future improvements after launch.
